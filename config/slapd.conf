include /etc/ldap/schema/core.schema
include /etc/ldap/schema/cosine.schema
include /etc/ldap/schema/inetorgperson.schema
include /etc/ldap/schema/nis.schema
include /etc/ldap/schema/ppolicy-extension.schema

pidfile /var/run/slapd/slapd.pid
argsfile /var/run/slapd/slapd.args

modulepath /usr/lib/ldap
moduleload back_mdb
moduleload ppolicy

database mdb
suffix "dc=example,dc=com"
rootdn "cn=admin,dc=example,dc=com"
rootpw admin123
directory /var/lib/ldap
index objectClass eq
index cn,uid pres,eq,sub
index dc eq

# ACL: 用户可以修改自己的密码，admin 可以修改所有
access to attrs=userPassword
    by self write
    by anonymous auth
    by * none

access to *
    by self read
    by users read
    by * none

# ppolicy overlay 配置
overlay ppolicy
ppolicy_default "cn=default,ou=pwpolicies,dc=example,dc=com"
ppolicy_check_module /workspace/ppolicy-extensions/lib/ppolicy_ext.so
